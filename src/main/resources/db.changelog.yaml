  - changeSet:
      id: 2026-005a
      author: Proton Lumo
      created: 2025-04-27
      changes:
        - addUniqueConstraint:
            constraintName: un_issue_participants_user_id
            tableName: issue_participants
            columnNames: issue_id, user_id

        - addUniqueConstraint:
            constraintName: un_issue_participants_group_id
            tableName: issue_participants
            columnNames: issue_id, group_id

        - sql:
            comment: Adds a check constraint
            sql: |
              ALTER TABLE issue_participants
              ADD CONSTRAINT chk_issue_participants_xor_user_group
              CHECK (
                (user_id IS NULL AND group_id IS NOT NULL)
                OR
                (user_id IS NOT NULL AND group_id IS NULL)
              );
