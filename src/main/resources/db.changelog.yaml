databaseChangeLog:
  - changeSet:
      id: 2026-001
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_users
              - column:
                  name: provider_id
                  type: varchar(50)
                  constraints:
                    uniqueConstraintName: un_users_provider_id
                    unique: true
                    nullable: true
              - column:
                  name: name
                  type: varchar(100)
              - column:
                  name: email
                  type: varchar(100)
              - column:
                  name: roles
                  type: json
                  remarks: penis

  - changeSet:
      id: 2026-002
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: user_groups
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_user_groups

              - column:
                  name: provider_id
                  type: varchar(50)
                  constraints:
                    unique: true
                    uniqueConstraintName: un_user_groups_provider_id
                    nullable: true

              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    unique: true
                    uniqueConstraintName: un_user_groups_name
                    nullable: false

              - column:
                  name: label
                  type: varchar(50)
                  constraints:
                    unique: true
                    uniqueConstraintName: un_user_groups_label

              - column:
                  name: is_system
                  type: bool
                  defaultValueBoolean: false

              - column:
                  name: icon
                  type: varchar(50)
                  constraints:
                    nullable: true

              - column:
                  name: colour
                  type: varchar(50)
                  constraints:
                    nullable: true

              - column:
                  name: roles
                  type: json
                  constraints:
                    nullable: true

  - changeSet:
      id: 2026-003
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: user_user_group
            remarks: Many to Many relation for users -- user_groups
            columns:
              - column:
                  name: group_id
                  type: bigint
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false

        - addPrimaryKey:
            constraintName: pk_user_user_group
            tableName: user_user_group
            columnNames: user_id, group_id

        - addForeignKeyConstraint:
            constraintName: fk_user_user_group_user_id
            baseTableName: user_user_group
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_user_user_group_group_id
            baseTableName: user_user_group
            baseColumnNames: group_id
            referencedTableName: user_groups
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 2026-004
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: districts
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_districts
              - column:
                  name: name
                  type: varchar(50)
                  constraints:
                    unique: true
                    uniqueConstraintName: un_districts_name
                    nullable: false
              - column:
                  name: colour
                  type: varchar(50)
                  constraints:
                    nullable: true
              - column:
                  name: group_id
                  type: bigint
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            constraintName: fk_districts_group_id
            baseTableName: districts
            baseColumnNames: group_id
            referencedTableName: user_groups
            referencedColumnNames: id
            onDelete: SET NULL

  - changeSet:
      id: 2026-005
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - loadData:
            tableName: districts
            file: districts.csv
            columns:
              - column:
                  name: name
                  header: name
              - column:
                  name: colour
                  header: colour

  - changeSet:
      id: 2026-006
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: vendors
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_vendors
              - column:
                  name: number
                  type: varchar(10)
              - column:
                  name: number_numeric
                  type: bigint
              - column:
                  name: vendor_type
                  type: varchar(30)
                  defaultValue: shop
              - column:
                  name: name
                  type: varchar(200)
              - column:
                  name: district_id
                  type: bigint
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            constraintName: fk_vendors_district_id
            baseTableName: vendors
            baseColumnNames: district_id
            referencedTableName: districts
            referencedColumnNames: id
            onDelete: SET NULL

  - changeSet:
      id: 2026-010
      author: Roelof Roos
      created: 2026-05-15
      changes:
        - createTable:
            tableName: chats
            columns:
              - column:
                  name: id
