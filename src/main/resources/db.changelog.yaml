                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_chats
              - column:
                  name: key
                  type: varchar(50)
                  constraints:
                    nullable: true
                    uniqueConstraintName: un_chats_key
                    unique: true
              - column:
                  name: title
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: state
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp(6)
                  constraints:
                    nullable: false

  - changeSet:
      id: 2026-011
      author: Roelof Roos
      created: 2026-05-15
      changes:
        - createTable:
            tableName: chat_users
            columns:
              - column:
                  name: chat_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false

        - addPrimaryKey:
            constraintName: pk_chat_users
            tableName: chat_users
            columnNames: chat_id, user_id

        - addForeignKeyConstraint:
            constraintName: fk_chat_users_chat_id
            baseTableName: chat_users
            baseColumnNames: chat_id
            referencedTableName: chats
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_chat_users_user_id
            baseTableName: chat_users
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 2026-012
      author: Roelof Roos
      created: 2026-05-15
      changes:
        - createTable:
            tableName: chat_groups
            columns:
              - column:
