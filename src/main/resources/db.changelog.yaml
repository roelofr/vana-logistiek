databaseChangeLog:
  - changeSet:
      id: 2026-001
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_users
              - column:
                  name: provider_id
                  type: varchar(50)
                  constraints:
                    uniqueConstraintName: un_users_provider_id
                    unique: true
                    nullable: true
              - column:
                  name: name
                  type: varchar(100)
              - column:
                  name: email
                  type: varchar(100)
              - column:
                  name: roles
                  type: json
                  remarks: penis

  - changeSet:
      id: 2026-002
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: user_groups
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_user_groups

              - column:
                  name: provider_id
                  type: varchar(50)
                  constraints:
                    unique: true
                    uniqueConstraintName: un_user_groups_provider_id
                    nullable: true

              - column:
                  name: name
                  type: varchar(100)
                  constraints:
                    unique: true
                    uniqueConstraintName: un_user_groups_name
                    nullable: false

              - column:
                  name: label
                  type: varchar(50)
                  constraints:
                    unique: true
                    uniqueConstraintName: un_user_groups_label

              - column:
                  name: is_system
                  type: bool
                  defaultValueBoolean: false

              - column:
                  name: icon
                  type: varchar(50)
                  constraints:
                    nullable: true

              - column:
                  name: colour
                  type: varchar(50)
                  constraints:
                    nullable: true

              - column:
                  name: roles
                  type: json
                  constraints:
                    nullable: true

  - changeSet:
      id: 2026-003
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: user_user_group
            remarks: Many to Many relation for users -- user_groups
            columns:
              - column:
                  name: group_id
                  type: bigint
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false

        - addPrimaryKey:
            constraintName: pk_user_user_group
            tableName: user_user_group
            columnNames: user_id, group_id

        - addForeignKeyConstraint:
            constraintName: fk_user_user_group_user_id
            baseTableName: user_user_group
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_user_user_group_group_id
            baseTableName: user_user_group
            baseColumnNames: group_id
            referencedTableName: user_groups
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 2026-004
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: districts
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_districts
              - column:
                  name: name
                  type: varchar(50)
                  constraints:
                    unique: true
                    uniqueConstraintName: un_districts_name
                    nullable: false
              - column:
                  name: colour
                  type: varchar(50)
                  constraints:
                    nullable: true
              - column:
                  name: group_id
                  type: bigint
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            constraintName: fk_districts_group_id
            baseTableName: districts
            baseColumnNames: group_id
            referencedTableName: user_groups
            referencedColumnNames: id
            onDelete: SET NULL

  - changeSet:
      id: 2026-005
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - loadData:
            tableName: districts
            file: districts.csv
            columns:
              - column:
                  name: name
                  header: name
              - column:
                  name: colour
                  header: colour

  - changeSet:
      id: 2026-006
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: vendors
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_vendors
              - column:
                  name: number
                  type: varchar(10)
              - column:
                  name: number_numeric
                  type: bigint
              - column:
                  name: vendor_type
                  type: varchar(30)
                  defaultValue: shop
              - column:
                  name: name
                  type: varchar(200)
              - column:
                  name: district_id
                  type: bigint
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            constraintName: fk_vendors_district_id
            baseTableName: vendors
            baseColumnNames: district_id
            referencedTableName: districts
            referencedColumnNames: id
            onDelete: SET NULL

  - changeSet:
      id: 2026-010
      author: Roelof Roos
      created: 2026-05-15
      changes:
        - createTable:
            tableName: chats
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_chats
              - column:
                  name: key
                  type: varchar(50)
                  constraints:
                    nullable: true
                    uniqueConstraintName: un_chats_key
                    unique: true
              - column:
                  name: title
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: state
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp(6)
                  constraints:
                    nullable: false

  - changeSet:
      id: 2026-011
      author: Roelof Roos
      created: 2026-05-15
      changes:
        - createTable:
            tableName: chat_users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_chat_users
              - column:
                  name: chat_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp(6)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            constraintName: fk_chat_users_chat_id
            baseTableName: chat_users
            baseColumnNames: chat_id
            referencedTableName: chats
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_chat_users_user_id
            baseTableName: chat_users
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: CASCADE

        - addUniqueConstraint:
            constraintName: un_chat_users_chat_id_user_id
            tableName: chat_users
            columnNames: "chat_id, user_id"

  - changeSet:
      id: 2026-012
      author: Roelof Roos
      created: 2026-05-15
      changes:
        - createTable:
            tableName: chat_groups
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_chat_groups
              - column:
                  name: chat_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: group_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: timestamp(6)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            constraintName: fk_chat_groups_chat_id
            baseTableName: chat_groups
            baseColumnNames: chat_id
            referencedTableName: chats
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_chat_groups_group_id
            baseTableName: chat_groups
            baseColumnNames: group_id
            referencedTableName: user_groups
            referencedColumnNames: id
            onDelete: CASCADE

        - addUniqueConstraint:
            constraintName: un_chat_groups_chat_id_group_id
            tableName: chat_groups
            columnNames: "chat_id, group_id"

  - changeSet:
      id: 2026-013
      author: Roelof Roos
      created: 2026-05-15
      changes:
        - createTable:
            tableName: chat_entries
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_chat_entries
              - column:
                  name: chat_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: group_id
                  type: bigint
                  constraints:
                    nullable: true
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: true

              - column:
                  name: entry_type
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: grouping_key
                  type: uuid

              - column:
                  name: message
                  type: text
              - column:
                  name: file_status
                  type: varchar(10)
              - column:
                  name: file_type
                  type: varchar(10)
              - column:
                  name: file_mime
                  type: varchar(100)
              - column:
                  name: file_path
                  type: varchar(200)
              - column:
                  name: file_name
                  type: varchar(200)

              - column:
                  name: created_at
                  type: timestamp(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp(6)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            constraintName: fk_chat_entries_chat_id
            baseTableName: chat_entries
            baseColumnNames: chat_id
            referencedTableName: chats
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_chat_entries_user_id
            baseTableName: chat_entries
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL

        - addForeignKeyConstraint:
            constraintName: fk_chat_entries_group_id
            baseTableName: chat_entries
            baseColumnNames: group_id
            referencedTableName: user_groups
            referencedColumnNames: id
            onDelete: SET NULL

  - changeSet:
      id: 2026-014
      author: Roelof Roos
      created: 2026-05-16
      changes:
        - loadData:
            tableName: user_groups
            file: required-groups.tsv
            separator: "\t"
            columns:
              - column:
                  name: name
                  header: name
              - column:
                  name: label
                  header: label
                  constraints:
                    nullable: true
              - column:
                  name: icon
                  header: icon
                  constraints:
                    nullable: true
              - column:
                  name: colour
                  header: colour
                  constraints:
                    nullable: true
              - column:
                  name: is_system
                  value: 'true'

  - changeSet:
      id: 2026-015
      author: Roelof Roos
      created: 2026-05-27
      changes:
        - renameColumn:
            tableName: chats
            oldColumnName: key
            newColumnName: chat_key
        - dropUniqueConstraint:
            tableName: chats
            constraintName: un_chats_key
        - addUniqueConstraint:
            tableName: chats
            constraintName: un_chats_chat_key
            columnNames: chat_key

  - changeSet:
      id: 2026-017
      author: Roelof Roos
      created: 2026-06-01
      changes:
        - createTable:
            tableName: issues
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_issues
              - column:
                  name: chat_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: vendor_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: assigned_user_id
                  type: bigint
              - column:
                  name: assigned_group_id
                  type: bigint
              - column:
                  name: created_at
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: resolved_at
                  type: datetime
                  constraints:
                    nullable: true

        - addUniqueConstraint:
            constraintName: un_issues_chat_id
            tableName: issues
            columnNames: chat_id

        - addForeignKeyConstraint:
            constraintName: fk_issues_chat_id
            baseTableName: issues
            baseColumnNames: chat_id
            referencedTableName: chats
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_issues_vendor_id
            baseTableName: issues
            baseColumnNames: vendor_id
            referencedTableName: vendors
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_issues_assigned_user_id
            baseTableName: issues
            baseColumnNames: assigned_user_id
            referencedTableName: users
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_issues_assigned_group_id
            baseTableName: issues
            baseColumnNames: assigned_group_id
            referencedTableName: user_groups
            referencedColumnNames: id
