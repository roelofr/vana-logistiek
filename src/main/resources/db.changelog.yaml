              - column:
                  name: group_id
                  type: bigint
                  constraints:
                    nullable: false

        - addPrimaryKey:
            constraintName: pk_chat_groups
            tableName: chat_groups
            columnNames: chat_id, group_id

        - addForeignKeyConstraint:
            constraintName: fk_chat_groups_chat_id
            baseTableName: chat_groups
            baseColumnNames: chat_id
            referencedTableName: chats
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_chat_groups_group_id
            baseTableName: chat_groups
            baseColumnNames: group_id
            referencedTableName: user_groups
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 2026-013
      author: Roelof Roos
      created: 2026-05-15
      changes:
        - createTable:
            tableName: chat_entries
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_chat_entries
              - column:
                  name: chat_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: group_id
                  type: bigint
                  constraints:
                    nullable: true
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: true

              - column:
                  name: entry_type
                  type: varchar(16)
                  constraints:
                    nullable: false
              - column:
                  name: grouping_key
                  type: uuid

              - column:
                  name: message
                  type: text
              - column:
                  name: file_status
                  type: varchar(10)
              - column:
                  name: file_type
                  type: varchar(10)
              - column:
                  name: file_mime
                  type: varchar(100)
              - column:
                  name: file_path
                  type: varchar(200)
              - column:
                  name: file_name
                  type: varchar(200)

              - column:
                  name: created_at
                  type: timestamp(6)
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: timestamp(6)
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            constraintName: fk_chat_entries_chat_id
            baseTableName: chat_entries
            baseColumnNames: chat_id
            referencedTableName: chats
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_chat_entries_user_id
            baseTableName: chat_entries
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id
            onDelete: SET NULL

        - addForeignKeyConstraint:
            constraintName: fk_chat_entries_group_id
            baseTableName: chat_entries
            baseColumnNames: group_id
            referencedTableName: user_groups
            referencedColumnNames: id
            onDelete: SET NULL

  - changeSet:
      id: 2026-014
      author: Roelof Roos
      created: 2026-05-16
      changes:
        - loadData:
            tableName: user_groups
            file: required-groups.tsv
            separator: "\t"
            columns:
              - column:
                  name: name
                  header: name
              - column:
                  name: label
                  header: label
                  constraints:
                    nullable: true
              - column:
                  name: icon
                  header: icon
                  constraints:
                    nullable: true
              - column:
                  name: colour
                  header: colour
                  constraints:
                    nullable: true
              - column:
                  name: is_system
                  value: 'true'

  - changeSet:
      id: 2026-015
      author: Roelof Roos
      created: 2026-05-27
      changes:
        - renameColumn:
            tableName: chats
            oldColumnName: key
            newColumnName: chat_key
            columnDataType: varchar(50)
        - dropUniqueConstraint:
            tableName: chats
            constraintName: un_chats_key
        - addUniqueConstraint:
            tableName: chats
            constraintName: un_chats_chat_key
            columnNames: chat_key

  - changeSet:
      id: 2026-016
      author: Roelof Roos
      created: 2026-06-01
      changes:
        - createTable:
            tableName: issues
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_issues
              - column:
                  name: chat_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: vendor_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: assigned_user_id
                  type: bigint
              - column:
                  name: assigned_group_id
                  type: bigint
              - column:
                  name: created_at
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: resolved_at
                  type: datetime
                  constraints:
                    nullable: true

        - addUniqueConstraint:
            constraintName: un_issues_chat_id
            tableName: issues
            columnNames: chat_id

        - addForeignKeyConstraint:
            constraintName: fk_issues_chat_id
            baseTableName: issues
            baseColumnNames: chat_id
            referencedTableName: chats
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_issues_vendor_id
            baseTableName: issues
            baseColumnNames: vendor_id
            referencedTableName: vendors
            referencedColumnNames: id
            onDelete: CASCADE

        - addForeignKeyConstraint:
            constraintName: fk_issues_assigned_user_id
            baseTableName: issues
            baseColumnNames: assigned_user_id
            referencedTableName: users
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_issues_assigned_group_id
            baseTableName: issues
            baseColumnNames: assigned_group_id
            referencedTableName: user_groups
            referencedColumnNames: id

  - changeSet:
      id: 2026-017
      author: Roelof Roos
      created: 2026-06-04
      changes:
        - addColumn:
            tableName: chats
            columns:
              - column:
                  name: chat_type
                  type: varchar(20)
                  constraints:
                    nullable: false

  - changeSet:
      id: 2026-018
      author: Roelof Roos
      created: 2026-06-08
      changes:
        - createTable:
            tableName: chat_subjects
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_chat_subjects
              - column:
                  name: chat_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: type
                  type: VARCHAR(50)
                  constraints:
                    nullable: false

        - addUniqueConstraint:
            constraintName: un_chat_subjects_chat_id
            tableName: chat_subjects
            columnNames: chat_id

        - addForeignKeyConstraint:
            constraintName: fk_chat_subjects_chat_id
            baseTableName: chat_subjects
            baseColumnNames: chat_id
            referencedTableName: chats
            referencedColumnNames: id
            onDelete: CASCADE

  - changeSet:
      id: 2026-019
      author: Roelof Roos
      created: 2026-06-08
      changes:
        - sql:
            comment: Create objects for each chat subject
            sql: |
              INSERT INTO chat_subjects (id, chat_id, type)
              SELECT id, chat_id, 'issue' FROM issues

  - changeSet:
      id: 2026-020
      author: Roelof Roos
      created: 2026-06-08
      changes:
        - dropForeignKeyConstraint:
            baseTableName: issues
            constraintName: fk_issues_chat_id
        - dropColumn:
            tableName: issues
            columnName: chat_id

  - changeSet:
      id: 2026-021
      author: Roelof Roos
      created: 2026-06-08
      changes:
        - addColumn:
            tableName: chats
            columns:
              - column:
                  name: subject_id
                  type: bigint
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            constraintName: fk_chats_subject_id
            baseTableName: chats
            baseColumnNames: subject_id
            referencedTableName: chat_subjects
            referencedColumnNames: id
            onDelete: SET NULL

  - changeSet:
      id: 2026-023
      author: Roelof Roos
      created: 2026-06-17
      changes:
        - addColumn:
            tableName: chat_entries
            columns:
              - column:
                  name: geo_lat
                  type: REAL
                  remarks: 'Latitude in WGS84 (approx 1m precision)'
                  constraints:
                    nullable: true
              - column:
                  name: geo_long
                  type: REAL
                  remarks: 'Longitude in WGS84 (approx 1m precision)'
                  constraints:
                    nullable: true

        - sql:
            comment: Check that either geo_lat and geo_long are both null or both set
            sql: |
              ALTER TABLE chat_entries ADD CONSTRAINT chk_chat_entries_geo_valid
                CHECK ((
                    geo_lat IS NULL
                    AND geo_long IS NULL
                  ) OR (
                    geo_lat IS NOT NULL
                    AND geo_lat BETWEEN -90 AND 90
                    AND geo_long IS NOT NULL
                    AND geo_long BETWEEN -180 AND 180
                  ))

  - changeSet:
      id: 2026-024
      author: Roelof Roos
      created: 2026-06-20
      changes:
        - renameColumn:
            tableName: chats
            oldColumnName: state
            newColumnName: chat_state
            columnDataType: varchar(16)

  - changeSet:
      id: 2026-026
      author: Roelof Roos
      created: 2026-06-29
      changes:
        - addColumn:
            tableName: users
            columns:
              - column:
                  name: avatar_url
                  type: varchar(200)

  - changeSet:
      id: 2026-027
      author: Roelof Roos
      created: 2026-07-05
      comment: |
        Add geolocation data to issues, as two doubles. I would like to use Postgres GIS, but don't really know how
        it works, and it's just two weeks until this must be in prod.
      changes:
        - addColumn:
            tableName: issues
            columns:
              - column:
                  name: geo_lat
                  type: double
              - column:
                  name: geo_lng
                  type: double
        - dropNotNullConstraint:
            tableName: issues
            columnName: vendor_id

  - changeSet:
      id: 2026-028
      author: Roelof Roos
      created: 2026-07-06
      changes:
        - sql:
            comment: Reset all vendors to be shops
            sql: UPDATE vendors SET vendor_type = 'Shop'
        - addNotNullConstraint:
            tableName: vendors
            columnName: vendor_type
