databaseChangeLog:
  - changeSet:
      id: 2026-001
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_users
              - column:
                  name: provider_id
                  type: varchar(50)
                  constraints:
                    uniqueConstraintName: un_users_provider_id
                    unique: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
              - column:
                  name: email
                  type: varchar(100)
              - column:
                  name: roles
                  type: json
                  remarks: penis

  - changeSet:
      id: 2026-002
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: groups
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_groups

              - column:
                  name: name
                  type: varchar(50)
                  constraints:
                    unique: true
                    uniqueConstraintName: un_groups_name
                    nullable: false

              - column:
                  name: label
                  type: varchar(50)
                  constraints:
                    unique: true
                    uniqueConstraintName: un_groups_label

              - column:
                  name: is_system
                  type: bool
                  defaultValueBoolean: false

              - column:
                  name: icon
                  type: varchar(50)
                  constraints:
                    nullable: true

              - column:
                  name: colour
                  type: varchar(50)
                  constraints:
                    nullable: true

  - changeSet:
      id: 2026-003
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: group_users
            columns:
              - column:
                  name: group_id
                  type: bigint
                  constraints:
                    nullable: false

              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false

        - addPrimaryKey:
            constraintName: pk_group_users
            tableName: group_users
            columnNames: user_id, group_id

        - addForeignKeyConstraint:
            constraintName: fk_group_users_user_id
            baseTableName: group_users
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_group_users_group_id
            baseTableName: group_users
            baseColumnNames: group_id
            referencedTableName: groups
            referencedColumnNames: id

  - changeSet:
      id: 2026-004
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: districts
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_districts
              - column:
                  name: name
                  type: varchar(50)
                  constraints:
                    unique: true
                    uniqueConstraintName: un_districts_name
                    nullable: false
              - column:
                  name: colour
                  type: varchar(50)
                  constraints:
                    nullable: true
              - column:
                  name: group_id
                  type: bigint
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            constraintName: fk_districts_group_id
            baseTableName: districts
            baseColumnNames: group_id
            referencedTableName: groups
            referencedColumnNames: id

  - changeSet:
      id: 2026-005
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - loadData:
            tableName: districts
            file: districts.csv
            columns:
              - column:
                  name: name
                  header: name
              - column:
                  name: colour
                  header: colour

  - changeSet:
      id: 2026-006
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: vendors
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_vendors
              - column:
                  name: number
                  type: varchar(10)
              - column:
                  name: number_numeric
                  type: bigint
              - column:
                  name: vendor_type
                  type: varchar(30)
                  defaultValue: shop
              - column:
                  name: name
                  type: varchar(200)
              - column:
                  name: district_id
                  type: bigint
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            constraintName: fk_vendors_district_id
            baseTableName: vendors
            baseColumnNames: district_id
            referencedTableName: districts
            referencedColumnNames: id

  - changeSet:
      id: 2026-007
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: issues
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_issues
              - column:
                  name: subject
                  type: varchar(200)
                  constraints:
                    nullable: false
              - column:
                  name: vendor_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: group_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: assigned_user_id
                  type: bigint
              - column:
                  name: assigned_group_id
                  type: bigint
              - column:
                  name: is_read
                  type: bit
                  defaultValueBoolean: false
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: updated_at
                  type: datetime
                  constraints:
                    nullable: false
              - column:
                  name: resolved_at
                  type: datetime
                  constraints:
                    nullable: true

        - addForeignKeyConstraint:
            constraintName: fk_issues_vendor_id
            baseTableName: issues
            baseColumnNames: vendor_id
            referencedTableName: vendors
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_issues_user_id
            baseTableName: issues
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_issues_group_id
            baseTableName: issues
            baseColumnNames: group_id
            referencedTableName: groups
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_issues_assigned_group_id
            baseTableName: issues
            baseColumnNames: assigned_group_id
            referencedTableName: groups
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_issues_assigned_user_id
            baseTableName: issues
            baseColumnNames: assigned_user_id
            referencedTableName: users
            referencedColumnNames: id

  - changeSet:
      id: 2026-008
      author: Roelof Roos
      created: 2026-04-27
      changes:
        - createTable:
            tableName: issue_participants
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_issues
              - column:
                  name: issue_id
                  type: bigint
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: bigint
              - column:
                  name: group_id
                  type: bigint
              - column:
                  name: created_at
                  type: datetime
                  constraints:
                    nullable: false

        - addForeignKeyConstraint:
            constraintName: fk_issue_participants_issue_id
            baseTableName: issue_participants
            baseColumnNames: issue_id
            referencedTableName: issues
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_issue_participants_user_id
            baseTableName: issue_participants
            baseColumnNames: user_id
            referencedTableName: users
            referencedColumnNames: id

        - addForeignKeyConstraint:
            constraintName: fk_issue_participants_group_id
            baseTableName: issue_participants
            baseColumnNames: group_id
            referencedTableName: groups
            referencedColumnNames: id

  - changeSet:
      id: 2026-009
      author: Proton Lumo
      created: 2025-04-27
      changes:
        - addUniqueConstraint:
            constraintName: un_issue_participants_user_id
            tableName: issue_participants
            columnNames: issue_id, user_id

        - addUniqueConstraint:
            constraintName: un_issue_participants_group_id
            tableName: issue_participants
            columnNames: issue_id, group_id

        - sql:
            comment: Adds a check constraint
            sql: |
              ALTER TABLE issue_participants
              ADD CONSTRAINT chk_issue_participants_xor_user_group
              CHECK (
                (user_id IS NULL AND group_id IS NOT NULL)
                OR
                (user_id IS NOT NULL AND group_id IS NULL)
              );
