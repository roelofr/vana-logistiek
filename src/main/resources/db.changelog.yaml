databaseChangeLog:
  - changeSet:
      id: 2025-12-001
      author: Roelof Roos
      created: 2025-12-07
      changes:
        - createTable:
            tableName: teams
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_teams
              - column:
                  name: name
                  type: varchar(50)
                  constraints:
                    unique: true
                    uniqueConstraintName: un_teams_name
                    nullable: false
              - column:
                  name: icon
                  type: varchar(50)
                  constraints:
                    nullable: true
              - column:
                  name: colour
                  type: varchar(50)
                  constraints:
                    nullable: true

  - changeSet:
      id: 2025-12-002
      author: Roelof Roos
      created: 2025-12-07
      changes:
        - createTable:
            tableName: users
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_users
              - column:
                  name: provider_id
                  type: varchar(50)
                  constraints:
                    uniqueConstraintName: un_users_provider_id
                    unique: true
                    nullable: false
              - column:
                  name: name
                  type: varchar(100)
              - column:
                  name: email
                  type: varchar(100)
              - column:
                  name: team_id
                  type: bigint
              - column:
                  name: roles
                  type: json
                  remarks: penis

        - addForeignKeyConstraint:
            constraintName: fk_users_team_id
            baseTableName: users
            baseColumnNames: team_id
            referencedTableName: teams
            referencedColumnNames: id

  - changeSet:
      id: 2025-12-003
      author: Roelof Roos
      created: 2025-12-07
      changes:
        - createTable:
            tableName: districts
            columns:
              - column:
                  name: id
                  type: bigint
                  autoIncrement: true
                  constraints:
                    nullable: false
                    primaryKey: true
                    primaryKeyName: pk_districts
              - column:
                  name: name
                  type: varchar(50)
                  constraints:
