networks:
  vana-logistiek-dev:

volumes:
  pgdata:

services:
  database:
    image: postgres
    restart: always
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - vana-logistiek-dev
    volumes:
      - pgdata:/var/lib/postgresql
      - ./lib/postgres-init:/docker-entrypoint-initdb.d/:ro

  adminer:
    image: adminer
    restart: always
    links:
      - database:db
    environment: {}
    ports:
      - 127.0.0.1:5080:8080
    networks:
      - vana-logistiek-dev

  keycloak:
    profiles:
      - keycloak
    image: keycloak/keycloak:26.5
    command:
      - start
      - --http-enabled
      - 'true'
      - --verbose
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./src/main/resources/quarkus-realm.json:/data/import/quarkus-realm.json:ro
    environment:
      KC_BOOTSTRAP_ADMIN_USERNAME: admin
      KC_BOOTSTRAP_ADMIN_PASSWORD: admin

      #      KC_DB: dev-file
      KC_DB_URL: jdbc:postgres://database:3306/keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: keycloak
    ports:
      - "127.0.0.1:9010:8080"
    networks:
      - vana-logistiek-dev

  export:
    profiles:
      - keycloak
    build:
      context: keycloak/
    command:
      - export
      - --optimized
      - --users
      - same_file
      - --file
      - /data/export/quarkus-realm.json
      - --realm
      - quarkus
    depends_on:
      database:
        condition: service_healthy
    volumes:
      - ./keycloak/export:/data/export
    environment:
      KC_DB_URL: jdbc:mysql://database:3306/quarkus
      KC_DB_USERNAME: quarkus
      KC_DB_PASSWORD: quarkus
    networks:
      - vana-logistiek-dev
